<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond blanc avec ombre légère -->
  <rect width="100" height="100" rx="18" fill="#FFFFFF"/>
  <rect width="100" height="100" rx="18" fill="none" stroke="rgba(13,169,164,0.25)" stroke-width="2.5"/>

  <!-- J' — rose, style cursive italic, haut-gauche -->
  <text x="4" y="54"
    font-family="Georgia,'Times New Roman',serif"
    font-style="italic"
    font-weight="700"
    font-size="48"
    fill="#D4197A"
    letter-spacing="-1">J'</text>

  <!-- TD — teal, gras, bas (chevauche légèrement comme le vrai logo) -->
  <text x="6" y="97"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="900"
    font-size="62"
    fill="#0DA9A4"
    letter-spacing="-4">TD</text>
</svg>
